<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PrestApp - Dashboard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap');
:root{
  --bg:#F7F6F2;--bg2:#fff;--border:rgba(0,0,0,0.09);
  --text:#1A1A18;--text2:#6B6A65;--teal:#0F6E56;--r:12px;--f:'DM Sans',sans-serif;
}
body{font-family:var(--f);background:var(--bg);margin:0;padding:0}
#app-screen{display:none;padding:20px}
.topbar{background:var(--bg2);padding:15px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.card{background:var(--bg2);border-radius:var(--r);padding:20px;margin-bottom:20px;border:1px solid var(--border)}
.auth-logo{font-size:22px;font-weight:600}
.auth-logo span{color:var(--teal)}
.btn-logout{background:none;border:none;color:#A32D2D;font-weight:600;cursor:pointer}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px}
.stat-card{background:var(--teal);color:#fff;padding:15px;border-radius:var(--r)}
.stat-val{font-size:20px;font-weight:600}
</style>
</head>
<body>

<div id="app-screen">
  <div class="topbar">
    <div class="auth-logo">Prest<span>App</span></div>
    <button class="btn-logout" onclick="location.reload()">Cerrar Sesión</button>
  </div>

  <div style="margin-top:20px">
    <h2>Hola, Isidro 👋</h2>
    <p style="color:var(--text2)">Este es el resumen de tu operación logística de préstamos.</p>
  </div>

  <div class="stat-grid" style="margin-top:20px">
    <div class="stat-card">
      <div style="font-size:12px opacity:0.8">Total Prestado</div>
      <div class="stat-val">$ 0.00</div>
    </div>
    <div class="stat-card" style="background:#fff; color:var(--text); border:1px solid var(--border)">
      <div style="font-size:12px; color:var(--text2)">Cobros Hoy</div>
      <div class="stat-val">$ 0.00</div>
    </div>
  </div>

  <div class="card" style="margin-top:20px">
    <h3>Préstamos Activos</h3>
    <p style="color:var(--text2); font-size:14px; margin-top:10px">No hay datos para mostrar todavía. Comienza agregando un cliente.</p>
    <button style="margin-top:15px; width:100%; padding:12px; background:var(--teal); color:#fff; border:none; border-radius:8px; font-weight:600">+ Nuevo Préstamo</button>
  </div>
</div>

<div id="auth-screen" style="display:flex; justify-content:center; align-items:center; min-height:100vh">
  <div style="background:#fff; padding:30px; border-radius:12px; width:350px; text-align:center; border:1px solid var(--border)">
    <div class="auth-logo" style="margin-bottom:20px">Prest<span>App</span></div>
    <input id="l-email" type="email" placeholder="Correo" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid var(--border); border-radius:8px">
    <input id="l-pass" type="password" placeholder="Clave" style="width:100%; padding:10px; margin-bottom:15px; border:1px solid var(--border); border-radius:8px">
    <button onclick="doLogin()" style="width:100%; padding:12px; background:var(--teal); color:#fff; border:none; border-radius:8px; font-weight:600">Ingresar</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyC-92ttHW5TqIOMto5H3tKu44n7H_crVAw",
  authDomain: "prestasurapp.firebaseapp.com",
  projectId: "prestasurapp",
  storageBucket: "prestasurapp.firebasestorage.app",
  messagingSenderId: "435740234941",
  appId: "1:435740234941:web:b854210e996f1660ab93d4"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// Función de Login corregida para CAMBIAR de pantalla
window.doLogin = async () => {
  const email = document.getElementById('l-email').value;
  const pass = document.getElementById('l-pass').value;
  try {
    await signInWithEmailAndPassword(auth, email, pass);
    // No hace falta alert, el observador de abajo se encarga
  } catch (e) {
    alert("Error: " + e.message);
  }
};

// ESTO ES LO QUE HACE QUE LA PANTALLA CAMBIE AUTOMÁTICAMENTE
onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'block';
  } else {
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app-screen').style.display = 'none';
  }
});
</script>
</body>
</html>
