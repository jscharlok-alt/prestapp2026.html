<div id="auth-screen">
    <div style="text-align:center; padding: 50px; font-family: Arial, sans-serif;">
        <h1 style="color: #2c3e50;">🏦 Préstamos 2026</h1>
        <p>Inicia sesión para gestionar tus créditos</p>
        </div>
</div>

<div id="app-screen" style="display:none; font-family: Arial, sans-serif;">
    <div style="background: #2c3e50; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center;">
        <strong id="user-name">Cargando...</strong>
        <button onclick="location.reload()" style="background: #e74c3c; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer;">Cerrar Sesión</button>
    </div>

    <div style="padding: 20px;">
        <h3>💰 Mis Préstamos</h3>
        <div id="lista-prestamos"></div>
    </div>

    <div class="admin-only" style="display:none; padding: 20px; background: #ecf0f1; margin-top: 20px; border-radius: 10px;">
        <h3 style="color: #2980b9;">🛠️ Panel de Control (Isidro)</h3>
        <div id="lista-usuarios"></div>
    </div>
</div>

<script type="module">
  // Aquí sigue todo tu código de Firebase...
  <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, collection, onSnapshot, addDoc, query, where, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// Credenciales recuperadas de tu historial de GitHub
const firebaseConfig = {
  apiKey: "AIzaSyC-92ttHW5TqIOMto5H3tKu44n7H_crVAw" ,
  authDomain: "prestapp2026-html.firebaseapp.com",
  projectId: "prestapp2026-html",
  storageBucket: "prestapp2026-html.appspot.com",
  messagingSenderId: "847250631332",
  appId: "1:847250631332:web:6570629705a266580a656a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// --- LÓGICA DE ESTADO DE USUARIO ---
onAuthStateChanged(auth, async (user) => {
  const authScreen = document.getElementById('auth-screen');
  const appScreen = document.getElementById('app-screen');

  if (user) {
    try {
      const userDoc = await getDoc(doc(db, "users", user.uid));
      if (userDoc.exists()) {
        const userData = userDoc.data();
        const rolLimpio = (userData.role || 'pending').toLowerCase();

        authScreen.classList.add('hidden');
        appScreen.classList.remove('hidden');
        document.getElementById('user-name').innerText = "Hola, " + (userData.nombre || "Usuario");

        if (rolLimpio === 'owner') {
          document.querySelectorAll('.admin-only').forEach(el => el.classList.remove('hidden'));
          loadAdminData();
          loadUsersForApproval();
        } else {
          document.querySelectorAll('.admin-only').forEach(el => el.classList.add('hidden'));
          loadClientData(userData.nombre);
        }
      } else {
        // Si el usuario es nuevo y no tiene "ficha" en la base de datos
        authScreen.classList.add('hidden');
        appScreen.classList.remove('hidden');
        document.getElementById('user-name').innerText = "Usuario Nuevo";
        document.getElementById('lista-prestamos').innerHTML = "<p style='text-align:center; padding:20px'>Tu cuenta está siendo revisada por el administrador.</p>";
      }
    } catch (e) {
      console.error("Error al obtener usuario:", e);
    }
  } else {
    // ESTO ES LO QUE VERÁ EL CLIENTE SI NO HA INICIADO SESIÓN
    authScreen.classList.remove('hidden');
    appScreen.classList.add('hidden');
  }
});

// --- FUNCIONES DE CARGA ---
async function loadAdminData() {
  onSnapshot(collection(db, "prestamos"), (snap) => {
    let total = 0;
    let html = '';
    snap.forEach(doc => {
      const p = doc.data();
      total += Number(p.monto || 0);
      html += `<div class="card"><b>${p.cliente}</b>: $${p.monto}</div>`;
    });
    document.getElementById('lista-prestamos').innerHTML = html || '<p>Sin préstamos registrados.</p>';
    if(document.getElementById('stat-total')) document.getElementById('stat-total').innerText = "$" + total.toLocaleString();
  });
}

async function loadClientData(nombre) {
  const q = query(collection(db, "prestamos"), where("cliente", "==", nombre));
  onSnapshot(q, (snap) => {
    let html = '';
    snap.forEach(doc => {
      html += `<div class="card">Tu préstamo: $${Number(doc.data().monto).toLocaleString()}</div>`;
    });
    document.getElementById('lista-prestamos').innerHTML = html || '<p>No tienes préstamos activos.</p>';
  });
}

async function loadUsersForApproval() {
  onSnapshot(collection(db, "users"), (snap) => {
    let html = '';
    snap.forEach(doc => {
      const u = doc.data();
      if(u.role !== 'owner') {
        html += `<div class="card" style="margin-bottom:10px; display:flex; justify-content:space-between; align-items:center">
          <span>${u.email} <b>(${u.role || 'pending'})</b></span>
          <select onchange="updateUserRole('${doc.id}', this.value)" style="padding:5px">
            <option value="pending" ${u.role === 'pending' ? 'selected' : ''}>Pendiente</option>
            <option value="client" ${u.role === 'client' ? 'selected' : ''}>Cliente</option>
          </select>
        </div>`;
      }
    });
    const lista = document.getElementById('lista-usuarios');
    if(lista) lista.innerHTML = html;
  });
}

window.updateUserRole = async (id, nuevoRol) => {
  try {
    await updateDoc(doc(db, "users", id), { role: nuevoRol });
    alert("Rol actualizado con éxito");
  } catch (e) {
    alert("Error al actualizar: " + e.message);
  }
};
</script>
