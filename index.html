<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PrestApp Pro - Sistema de Roles</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap');
:root{
  --bg:#F7F6F2;--bg2:#fff;--border:rgba(0,0,0,0.09);
  --text:#1A1A18;--text2:#6B6A65;--teal:#0F6E56;--r:12px;--f:'DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--f);background:var(--bg);color:var(--text)}

/* ESTILOS DE NAVEGACIÓN SEGÚN ROL */
.only-owner, .only-staff, .only-client { display: none; }

#app-screen{display:none}
.topbar{background:var(--bg2);padding:15px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}
.auth-logo{font-size:22px;font-weight:600}.auth-logo span{color:var(--teal)}
.container{padding:20px;max-width:500px;margin:0 auto}

.card{background:var(--bg2);border-radius:var(--r);padding:20px;margin-bottom:20px;border:1px solid var(--border)}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-bottom:20px}
.stat-card{background:var(--teal);color:#fff;padding:15px;border-radius:var(--r)}
.stat-val{font-size:22px;font-weight:600}

.btn-primary{width:100%;padding:14px;background:var(--teal);color:#fff;border:none;border-radius:var(--r);font-weight:600;cursor:pointer}
.btn-sec{background:none;border:none;color:#A32D2D;font-weight:600;cursor:pointer}

/* LOGIN */
#auth-screen{display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
.auth-box{background:#fff;padding:30px;border-radius:var(--r);width:100%;max-width:350px;border:1px solid var(--border);text-align:center}
.input-f{width:100%;padding:12px;margin-bottom:12px;border:1px solid var(--border);border-radius:8px;outline:none}
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo" style="margin-bottom:20px">Prest<span>App</span></div>
    <input id="l-email" type="email" placeholder="Correo" class="input-f">
    <input id="l-pass" type="password" placeholder="Contraseña" class="input-f">
    <button onclick="doLogin()" class="btn-primary">Ingresar</button>
  </div>
</div>

<div id="app-screen">
  <div class="topbar">
    <div class="auth-logo">Prest<span>App</span></div>
    <button class="btn-sec" onclick="doLogout()">Salir</button>
  </div>

  <div class="container">
    <h2 id="welcome-msg">Cargando...</h2>
    <p id="role-tag" style="font-size:12px; color:var(--teal); font-weight:600; margin-bottom:20px; text-transform: uppercase;"></p>

    <div class="stat-grid only-staff only-owner">
      <div class="stat-card">
        <p style="font-size:12px; opacity:0.8">En la calle</p>
        <div id="total-out" class="stat-val">$ 0</div>
      </div>
      <div class="stat-card only-owner" style="background:#1A1A18">
        <p style="font-size:12px; opacity:0.8">Ganancias Est.</p>
        <div id="total-profit" class="stat-val">$ 0</div>
      </div>
    </div>

    <div class="card only-staff only-owner">
      <h3 style="margin-bottom:15px">Gestión de Clientes</h3>
      <div id="admin-list">Cargando préstamos globales...</div>
    </div>

    <div class="card only-client">
      <h3 style="margin-bottom:15px">Mi Préstamo</h3>
      <div id="client-view">Buscando tu información...</div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, collection, onSnapshot, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC-92ttHW5TqIOMto5H3tKu44n7H_crVAw",
  authDomain: "prestasurapp.firebaseapp.com",
  projectId: "prestasurapp",
  storageBucket: "prestasurapp.firebasestorage.app",
  messagingSenderId: "435740234941",
  appId: "1:435740234941:web:b854210e996f1660ab93d4"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.doLogin = () => {
  const e = document.getElementById('l-email').value;
  const p = document.getElementById('l-pass').value;
  signInWithEmailAndPassword(auth, e, p).catch(() => alert("Credenciales incorrectas"));
};
window.doLogout = () => signOut(auth);

onAuthStateChanged(auth, async (user) => {
  if (user) {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'block';
    
    // 1. OBTENER ROL
    const userDoc = await getDoc(doc(db, "usuarios", user.email));
    const userData = userDoc.exists() ? userDoc.data() : { rol: 'cliente' };
    const rol = userData.rol;

    document.getElementById('welcome-msg').innerText = "Hola, " + (user.displayName || user.email.split('@')[0]);
    document.getElementById('role-tag').innerText = rol;

    // 2. MOSTRAR ELEMENTOS SEGÚN ROL
    document.querySelectorAll('.only-' + rol).forEach(el => el.style.display = 'block');
    if(rol === 'owner') { // Si es dueño también ve lo de staff
       document.querySelectorAll('.only-staff').forEach(el => el.style.display = 'block');
       document.querySelectorAll('.only-owner').forEach(el => el.style.display = 'block');
    }

    // 3. CARGAR DATOS SEGÚN ROL
    if (rol === 'owner' || rol === 'staff') {
      onSnapshot(collection(db, "prestamos"), (snap) => {
        let html = ''; let total = 0; let profit = 0;
        snap.forEach(d => {
          const p = d.data();
          const t = p.monto * (1 + p.interes/100);
          total += t; profit += (p.monto * p.interes/100);
          html += `<p><b>${p.cliente}</b>: $${t.toLocaleString()}</p>`;
        });
        document.getElementById('admin-list').innerHTML = html;
        document.getElementById('total-out').innerText = '$ ' + total.toLocaleString();
        document.getElementById('total-profit').innerText = '$ ' + profit.toLocaleString();
      });
    } else {
      // Lógica para que el cliente vea solo su préstamo por nombre
      const q = query(collection(db, "prestamos"), where("cliente", "==", user.email.split('@')[0]));
      onSnapshot(q, (snap) => {
        let html = '';
        snap.forEach(d => {
          const p = d.data();
          html += `<p>Saldo total: $${(p.monto * (1 + p.interes/100)).toLocaleString()}</p>`;
        });
        document.getElementById('client-view').innerHTML = html || 'No tienes préstamos activos.';
      });
    }

  } else {
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app-screen').style.display = 'none';
  }
});
</script>
</body>
</html>
