<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PrestApp</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap');
:root{
  --bg:#F7F6F2;--bg2:#fff;--border:rgba(0,0,0,0.09);
  --text:#1A1A18;--text2:#6B6A65;--teal:#0F6E56;
  --red:#A32D2D;--red-bg:#FCEBEB;--red-text:#791F1F;
  --r:12px;--rs:8px;--f:'DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--f);background:var(--bg);color:var(--text);display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
.auth-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:30px;width:100%;max-width:380px;box-shadow:0 10px 25px -5px rgba(0,0,0,0.05)}
.auth-logo{font-size:28px;font-weight:600;text-align:center;margin-bottom:8px}
.auth-logo span{color:var(--teal)}
.auth-sub{font-size:14px;color:var(--text2);text-align:center;margin-bottom:24px}
.auth-input{width:100%;padding:12px;border:1px solid var(--border);border-radius:var(--rs);margin-bottom:15px;outline:none;font-size:15px}
.auth-btn{width:100%;padding:14px;background:var(--teal);color:#fff;border:none;border-radius:var(--r);font-weight:600;cursor:pointer;transition:opacity 0.2s}
.auth-btn:active{opacity:0.8}
#auth-error{background:var(--red-bg);color:var(--red-text);padding:12px;border-radius:var(--rs);font-size:13px;margin-bottom:15px;display:none;text-align:center}
</style>
</head>
<body>

<div class="auth-card">
  <div class="auth-logo">Prest<span>App</span></div>
  <div class="auth-sub">Sistema de gestión de préstamos</div>
  <div id="auth-error"></div>
  
  <input id="l-email" type="email" class="auth-input" placeholder="Correo electrónico">
  <input id="l-pass" type="password" class="auth-input" placeholder="Contraseña">
  
  <button class="auth-btn" onclick="doLogin()">Ingresar</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyC-92ttHW5TqIOMto5H3tKu44n7H_crVAw",
  authDomain: "prestasurapp.firebaseapp.com",
  projectId: "prestasurapp",
  storageBucket: "prestasurapp.firebasestorage.app",
  messagingSenderId: "435740234941",
  appId: "1:435740234941:web:b854210e996f1660ab93d4"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.doLogin = async () => {
  const email = document.getElementById('l-email').value;
  const pass = document.getElementById('l-pass').value;
  const errorDiv = document.getElementById('auth-error');
  
  errorDiv.style.display = "none";

  if (!email || !pass) {
    errorDiv.textContent = "Por favor, llena todos los campos.";
    errorDiv.style.display = "block";
    return;
  }

  try {
    await signInWithEmailAndPassword(auth, email, pass);
    alert("¡Bienvenido Isidro!"); 
  } catch (e) {
    errorDiv.textContent = "Correo o contraseña incorrectos.";
    errorDiv.style.display = "block";
  }
};
</script>
</body>
</html>
