<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrestApp 2026 - Sistema de Gestión</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style> .hidden { display: none !important; } .active-tab { border-bottom: 3px solid #1a73e8; color: #1a73e8; font-weight: bold; } </style>
</head>
<body class="bg-gray-100 text-gray-800 min-h-screen">

    <div id="auth-screen" class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
            <h1 class="text-3xl font-bold text-center text-blue-800 mb-6">🏦 PrestApp 2026</h1>
            <div id="login-box">
                <input type="email" id="email" placeholder="Tu correo de dueño" class="w-full p-3 mb-3 border rounded-lg">
                <input type="password" id="password" placeholder="Tu contraseña" class="w-full p-3 mb-4 border rounded-lg">
                <button id="btn-login" class="w-full bg-blue-700 text-white p-3 rounded-lg font-bold hover:bg-blue-800">ENTRAR AHORA</button>
            </div>
        </div>
    </div>

    <div id="app-screen" class="hidden">
        <nav class="bg-blue-900 text-white p-4 flex justify-between items-center shadow-lg sticky top-0 z-50">
            <span class="font-bold text-lg" id="user-display">Cargando perfil...</span>
            <button onclick="location.reload()" class="bg-red-500 px-3 py-1 rounded text-sm font-bold">SALIR</button>
        </nav>

        <div id="menu-tabs" class="bg-white flex justify-around p-2 shadow-sm border-b overflow-x-auto">
            <button onclick="showTab('inicio')" class="tab-btn p-2 active-tab">Inicio</button>
            <button onclick="showTab('clientes')" class="tab-btn p-2 role-staff">Clientes</button>
            <button onclick="showTab('prestamos')" class="tab-btn p-2">Préstamos</button>
            <button onclick="showTab('ganancias')" class="tab-btn p-2 role-owner">Ganancias</button>
            <button onclick="showTab('usuarios')" class="tab-btn p-2 role-owner">Usuarios</button>
        </div>

        <div class="p-4 max-w-4xl mx-auto">
            <div id="tab-inicio" class="content-tab">
                <h2 class="text-2xl font-bold mb-4">Resumen</h2>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-white p-4 rounded-xl shadow border-l-4 border-blue-500">
                        <p class="text-xs text-gray-500">Total Prestado</p>
                        <p class="text-xl font-bold" id="stat-prestado">$0</p>
                    </div>
                </div>
            </div>
            <div id="tab-usuarios" class="content-tab hidden">
                <h2 class="text-2xl font-bold mb-4">Gestión de Usuarios</h2>
                <div id="lista-usuarios" class="space-y-2"></div>
            </div>
            <div id="tab-prestamos" class="content-tab hidden">
                <h2 class="text-2xl font-bold mb-4">Préstamos</h2>
                <div id="lista-prestamos" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, collection, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC-92ttHW5TqIOMto5H3tKu44n7H_crVAw",
            authDomain: "prestapp2026-html.firebaseapp.com",
            projectId: "prestapp2026-html",
            storageBucket: "prestapp2026-html.appspot.com",
            messagingSenderId: "847250631332",
            appId: "1:847250631332:web:6570629705a266580a656a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.showTab = (tabId) => {
            document.querySelectorAll('.content-tab').forEach(t => t.classList.add('hidden'));
            document.getElementById('tab-'+tabId).classList.remove('hidden');
        };

        document.getElementById('btn-login').onclick = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            try { await signInWithEmailAndPassword(auth, email, pass); }
            catch (e) { alert("Error: Datos incorrectos"); }
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                let userDoc = await getDoc(doc(db, "users", user.uid));
                
                // --- LLAVE MAESTRA TEMPORAL ---
                // Si entras tú, el sistema te convierte en OWNER sí o sí en la base de datos
                if (!userDoc.exists() || userDoc.data().role !== 'owner') {
                    await setDoc(doc(db, "users", user.uid), { 
                        nombre: "Isidro", 
                        email: user.email, 
                        role: 'owner' 
                    }, { merge: true });
                    userDoc = await getDoc(doc(db, "users", user.uid)); 
                }

                const userData = userDoc.data();
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                document.getElementById('user-display').innerText = `${userData.nombre} (DUEÑO)`;
                
                loadAdminData();
            }
        });

        function loadAdminData() {
            onSnapshot(collection(db, "users"), (snap) => {
                let h = '';
                snap.forEach(d => {
                    const u = d.data();
                    h += `<div class="bg-white p-3 shadow rounded flex justify-between items-center">
                        <span>${u.email}</span>
                        <select onchange="updateRole('${d.id}', this.value)" class="border rounded text-xs p-1">
                            <option value="pending" ${u.role==='pending'?'selected':''}>Pendiente</option>
                            <option value="client" ${u.role==='client'?'selected':''}>Cliente</option>
                            <option value="staff" ${u.role==='staff'?'selected':''}>Empleado</option>
                            <option value="owner" ${u.role==='owner'?'selected':''}>Dueño</option>
                        </select>
                    </div>`;
                });
                document.getElementById('lista-usuarios').innerHTML = h;
            });
        }

        window.updateRole = async (id, newRole) => {
            await updateDoc(doc(db, "users", id), { role: newRole });
            alert("Rol actualizado");
        };
    </script>
</body>
</html>
