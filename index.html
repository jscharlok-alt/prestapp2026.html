<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Préstamos 2026 - Isidro</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h1 { color: #1c1e21; text-align: center; font-size: 24px; margin-bottom: 10px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 14px; background: #007bff; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .hidden { display: none !important; }
        .header { background: #2c3e50; color: white; padding: 15px; width: 100%; position: fixed; top: 0; left: 0; text-align: center; }
        .content { margin-top: 80px; width: 100%; max-width: 500px; }
        .loan-card { background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 5px solid #28a745; }
    </style>
</head>
<body>

    <div id="auth-screen" class="card">
        <h1>🏦 Préstamos 2026</h1>
        <p style="text-align:center; color: #65676b;">Control de Créditos</p>
        <input type="email" id="email" placeholder="Correo electrónico">
        <input type="password" id="password" placeholder="Contraseña">
        <button id="btn-login">ENTRAR</button>
    </div>

    <div id="app-screen" class="hidden" style="width: 100%;">
        <div class="header">
            <span id="user-name">Hola, Usuario</span> | 
            <a href="#" id="btn-logout" style="color: #ff4d4d; text-decoration: none; font-weight: bold;">Salir</a>
        </div>
        <div class="content">
            <div id="admin-panel" class="hidden" style="background: #fff3cd; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #ffeeba;">
                <h3>🛠️ PANEL DE ISIDRO</h3>
                <div id="lista-usuarios">Cargando usuarios...</div>
            </div>
            
            <div class="card">
                <h3>💰 Mis Préstamos</h3>
                <div id="lista-prestamos">Buscando datos en la nube...</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, onSnapshot, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC-92ttHW5TqIOMto5H3tKu44n7H_crVAw",
            authDomain: "prestapp2026-html.firebaseapp.com",
            projectId: "prestapp2026-html",
            storageBucket: "prestapp2026-html.appspot.com",
            messagingSenderId: "847250631332",
            appId: "1:847250631332:web:6570629705a266580a656a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // CONFIGURACIÓN DE TU ACCESO (ISIDRO)
        const ADMIN_EMAIL = "isidrogonzalez85@gmail.com"; // <-- ASEGÚRATE QUE SEA ESTE TU CORREO

        document.getElementById('btn-login').onclick = async () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            try {
                await signInWithEmailAndPassword(auth, e, p);
            } catch (err) {
                alert("Error al entrar: " + err.message);
            }
        };

        document.getElementById('btn-logout').onclick = () => signOut(auth);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');

                // LÓGICA DE ACCESO AUTOMÁTICO PARA TI
                if (user.email === ADMIN_EMAIL) {
                    document.getElementById('user-name').innerText = "Hola, Isidro (Dueño)";
                    document.getElementById('admin-panel').classList.remove('hidden');
                    loadData(true, user.email);
                } else {
                    document.getElementById('user-name').innerText = "Hola, Cliente";
                    loadData(false, user.email);
                }
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('app-screen').classList.add('hidden');
            }
        });

        function loadData(isAdmin, email) {
            // Cargar Préstamos
            const q = isAdmin ? collection(db, "prestamos") : query(collection(db, "prestamos"), where("cliente_email", "==", email));
            onSnapshot(q, (snap) => {
                let h = '';
                snap.forEach(d => {
                    const p = d.data();
                    h += `<div class="loan-card"><b>${p.cliente || 'Préstamo'}</b><br>Monto: $${p.monto}</div>`;
                });
                document.getElementById('lista-prestamos').innerHTML = h || 'No hay datos registrados.';
            });

            // Cargar Usuarios si es Admin
            if (isAdmin) {
                onSnapshot(collection(db, "users"), (snap) => {
                    let h = '';
                    snap.forEach(d => {
                        const u = d.data();
                        h += `<div style="font-size:14px; border-bottom:1px solid #ccc; padding:5px;">👤 ${u.email} (${u.role})</div>`;
                    });
                    document.getElementById('lista-usuarios').innerHTML = h;
                });
            }
        }
    </script>
</body>
</html>
