<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PrestApp</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap');
:root{
  --bg:#F7F6F2;--bg2:#fff;--border:rgba(0,0,0,0.09);
  --text:#1A1A18;--text2:#6B6A65;--text3:#9E9D98;
  --teal:#0F6E56;--teal-bg:#E1F5EE;--teal-text:#085041;
  --red:#A32D2D;--red-bg:#FCEBEB;--red-text:#791F1F;
  --r:12px;--rs:8px;--f:'DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--f);background:var(--bg);color:var(--text);min-height:100vh;max-width:430px;margin:0 auto;overflow-x:hidden}

/* AUTH SCREENS */
#auth-screen, #pending-screen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;text-align:center}
.auth-logo{font-size:28px;font-weight:600;margin-bottom:4px}
.auth-logo span{color:var(--teal)}
.auth-card{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:20px;text-align:left}
.auth-tabs{display:flex;gap:6px;margin-bottom:16px}
.auth-tab{flex:1;padding:8px;border:1px solid var(--border);border-radius:var(--rs);background:transparent;font-size:13px;cursor:pointer}
.auth-tab.active{background:var(--teal);color:#fff}
.auth-input{width:100%;padding:10px;border:1px solid var(--border);border-radius:var(--rs);margin-bottom:12px;outline:none}
.auth-btn{width:100%;padding:12px;border-radius:var(--r);border:none;background:var(--teal);color:#fff;font-weight:600;cursor:pointer}
.auth-error{background:var(--red-bg);color:var(--red-text);padding:10px;border-radius:var(--rs);margin-bottom:10px;display:none;font-size:13px}

/* APP LAYOUT */
#app-screen{display:none}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh}
.spinner{width:30px;height:30px;border:3px solid #ddd;border-top-color:var(--teal);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="loader" class="loader"><div class="spinner"></div></div>

<div id="auth-screen">
  <div class="auth-logo">Prest<span>App</span></div>
  <p style="margin-bottom:20px; color:var(--text2)">Gestión de préstamos</p>
  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-l" onclick="showAuth('login')">Ingresar</button>
      <button class="auth-tab" id="tab-r" onclick="showAuth('register')">Registrarse</button>
    </div>
    <div id="auth-error" class="auth-error"></div>
    <div id="login-form">
      <input id="l-email" type="email" placeholder="Correo" class="auth-input">
      <input id="l-pass" type="password" placeholder="Contraseña" class="auth-input">
      <button class="auth-btn" onclick="doLogin()">Entrar</button>
    </div>
    <div id="register-form" style="display:none">
      <input id="r-name" type="text" placeholder="Nombre" class="auth-input">
      <input id="r-email" type="email" placeholder="Correo" class="auth-input">
      <input id="r-pass" type="password" placeholder="Clave (min 6)" class="auth-input">
      <button class="auth-btn" onclick="doRegister()">Crear cuenta</button>
    </div>
  </div>
</div>

<div id="pending-screen">
  <div style="font-size:40px">⏳</div>
  <h2>Cuenta en espera</h2>
  <p>El administrador debe activarte.</p>
  <button onclick="doLogout()" style="margin-top:20px">Cerrar sesión</button>
</div>

<div id="app-screen">
  <div class="topbar">
    <div class="auth-logo">Prest<span>App</span></div>
    <button onclick="doLogout()" style="background:none; border:none; color:var(--red)">Salir</button>
  </div>
  <div style="padding:20px">
    <h3>Bienvenido</h3>
    <p id="user-name-display"></p>
    <div id="role-display" style="margin-top:10px; font-weight:bold; color:var(--teal)"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC-92ttHW5TqIOMto5H3tKu44n7H_crVAw",
  authDomain: "prestasurapp.firebaseapp.com",
  projectId: "prestasurapp",
  storageBucket: "prestasurapp.firebasestorage.app",
  messagingSenderId: "435740234941",
  appId: "1:435740234941:web:b854210e996f1660ab93d4"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// Funciones globales para los botones
window.showAuth = (type) => {
  document.getElementById('login-form').style.display = type === 'login' ? 'block' : 'none';
  document.getElementById('register-form').style.display = type === 'login' ? 'none' : 'block';
  document.getElementById('tab-l').classList.toggle('active', type === 'login');
  document.getElementById('tab-r').classList.toggle('active', type === 'register');
};

window.doLogin = async () => {
  const email = document.getElementById('l-email').value;
  const pass = document.getElementById('l-pass').value;
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch (e) {
    showError("Correo o clave incorrectos");
  }
};

window.doRegister = async () => {
  const name = document.getElementById('r-name').value;
  const email = document.getElementById('r-email').value;
  const pass = document.getElementById('r-pass').value;
  if(!name || !email || pass.length < 6) return showError("Datos incompletos o clave corta");
  try {
    const res = await createUserWithEmailAndPassword(auth, email, pass);
    await setDoc(doc(db, "users", res.user.uid), {
      name, email, role: 'pending', createdAt: serverTimestamp()
    });
  } catch (e) {
    showError("Error al registrarse");
  }
};

window.doLogout = () => signOut(auth);

function showError(m) {
  const e = document.getElementById('auth-error');
  e.textContent = m;
  e.style.display = 'block';
}

// Observador de estado
onAuthStateChanged(auth, async (user) => {
  document.getElementById('loader').style.display = 'none';
  if (user) {
    const userDoc = await getDoc(doc(db, "users", user.uid));
    if (userDoc.exists()) {
      const data = userDoc.data();
      if (data.role === 'pending') {
        document.getElementById('pending-screen').style.display = 'flex';
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app-screen').style.display = 'none';
      } else {
        document.getElementById('app-screen').style.display = 'block';
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('pending-screen').style.display = 'none';
        document.getElementById('user-name-display').textContent = "Hola, " + data.name;
        document.getElementById('role-display').textContent = "Rol: " + data.role;
      }
    }
  } else {
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app-screen').style.display = 'none';
    document.getElementById('pending-screen').style.display = 'none';
  }
});
</script>
</body>
  
</html>
